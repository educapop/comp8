<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fóruns de Participação Social</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:0 20px;
    background:#f5f5f5;
}

.accordion{
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:6px;
    overflow:hidden;
    background:#fff;
}

.accordion button{
    width:100%;
    padding:15px 18px;
    border:none;
    background:#e9ecef;
    text-align:left;
    font-size:17px;
    cursor:pointer;
    transition:.2s;
}

.accordion button:hover{
    background:#dde2e6;
}

.content{
    display:none;
    padding:18px;
    border-top:1px solid #ddd;
}

.content p{
    margin-top:0;
}

.content a{
    color:#0056b3;
    text-decoration:none;
}

.content a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="accordion">
    <button>&#9656; <<Estado>></button>
    <div class="content">
        <p><<descricao>></p>
        <a href="LINK_DA_PORTARIA" target="_blank">
            Acessar portaria
        </a>
    </div>
</div>

<div class="accordion">
    <button>&#9656; <<Estado>></button>
    <div class="content">
        <p><<descricao>></p>
        <a href="LINK_DA_PORTARIA" target="_blank">
            Acessar portaria
        </a>
    </div>
</div>

<div class="accordion">
    <button>&#9656; <<Estado>></button>
    <div class="content">
        <p><<descricao>></p>
        <a href="LINK_DA_PORTARIA" target="_blank">
            Acessar portaria
        </a>
    </div>
</div>

<script>
document.querySelectorAll(".accordion button").forEach(btn=>{
    btn.addEventListener("click",function(){

        const content=this.nextElementSibling;

        document.querySelectorAll(".content").forEach(c=>{
            if(c!==content) c.style.display="none";
        });

        document.querySelectorAll(".accordion button").forEach(b=>{
            if(b!==this) b.innerHTML="&#9656; "+b.textContent.replace("▼ ","").replace("▶ ","");
        });

        if(content.style.display==="block"){
            content.style.display="none";
            this.innerHTML="&#9656; "+this.textContent.replace("▼ ","").replace("▶ ","");
        }else{
            content.style.display="block";
            this.innerHTML="&#9662; "+this.textContent.replace("▼ ","").replace("▶ ","");
        }
    });
});
</script>

</body>
</html>
